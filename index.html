<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #fdfaf4;
    --ink: #1a1510;
    --ink-soft: #6b5f4e;
    --accent: #b5862a;
    --border: #e0d5c0;
    --red-bg: #fff0ee;
    --red-border: #f5c0b5;
    --red-badge: #c0391b;
    --orange-bg: #fff8ee;
    --orange-border: #f5dca0;
    --orange-badge: #d07518;
    --green-bg: #eef8f0;
    --green-border: #b0ddb8;
    --green-badge: #2a9444;
  }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(181,134,42,0.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 75%, rgba(42,148,68,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 580px; }

  header { text-align: center; margin-bottom: 44px; }

  .eyebrow {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent);
    background: rgba(181,134,42,0.1);
    border: 1px solid rgba(181,134,42,0.25);
    padding: 5px 14px; border-radius: 100px; margin-bottom: 18px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.9rem, 6vw, 2.7rem);
    line-height: 1.15; color: var(--ink); letter-spacing: -0.01em;
  }
  h1 em { font-style: italic; color: var(--accent); }

  .subtitle { margin-top: 12px; font-size: 15px; color: var(--ink-soft); font-weight: 300; line-height: 1.6; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
  }

  .input-group { display: flex; flex-direction: column; gap: 11px; }

  label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); }

  .search-row { display: flex; gap: 10px; }

  .autocomplete-wrapper { position: relative; flex: 1; }

  input[type="text"] {
    width: 100%; padding: 15px 18px;
    font-family: 'DM Sans', sans-serif; font-size: 16px;
    color: var(--ink); background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 12px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]::placeholder { color: #b0a590; }
  input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(181,134,42,0.12); }

  .suggestions {
    display: none; position: absolute;
    top: calc(100% + 6px); left: 0; right: 0;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    z-index: 100; max-height: 220px; overflow-y: auto;
  }
  .suggestions.open { display: block; }

  .suggestion-item {
    padding: 11px 16px; cursor: pointer; font-size: 14.5px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s; text-transform: capitalize;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--bg); }

  .sug-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sug-dot.prohibited { background: var(--red-badge); }
  .sug-dot.caution    { background: var(--orange-badge); }
  .sug-dot.acceptable { background: var(--green-badge); }

  button.check-btn {
    padding: 15px 22px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    color: #fff; background: var(--ink); border: none; border-radius: 12px;
    cursor: pointer; transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18); white-space: nowrap;
  }
  button.check-btn:hover { background: #2e2418; box-shadow: 0 4px 20px rgba(0,0,0,0.22); }
  button.check-btn:active { transform: scale(0.98); }

  .legend { display: flex; justify-content: center; gap: 18px; margin-top: 22px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-soft); font-weight: 500; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .db-count { text-align: center; margin-top: 10px; font-size: 11.5px; color: var(--ink-soft); opacity: 0.7; }

  .divider {
    display: flex; align-items: center; gap: 14px;
    margin: 26px 0; font-size: 12px; color: var(--ink-soft);
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  #result { display: none; animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  .result-box { border-radius: 16px; padding: 26px; border: 1.5px solid; }
  .result-box.prohibited { background: var(--red-bg);    border-color: var(--red-border); }
  .result-box.caution    { background: var(--orange-bg); border-color: var(--orange-border); }
  .result-box.acceptable { background: var(--green-bg);  border-color: var(--green-border); }
  .result-box.not-found  { background: #f8f5f0;          border-color: var(--border); }

  .result-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }

  .food-name { font-family: 'DM Serif Display', serif; font-size: 1.45rem; line-height: 1.2; color: var(--ink); text-transform: capitalize; }

  .badge {
    flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 13px; border-radius: 100px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: #fff;
  }
  .badge.prohibited { background: var(--red-badge); }
  .badge.caution    { background: var(--orange-badge); }
  .badge.acceptable { background: var(--green-badge); }
  .badge.not-found  { background: var(--ink-soft); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.55); }

  .result-explanation { font-size: 14.5px; line-height: 1.65; color: var(--ink-soft); padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.08); }
  .result-icon { font-size: 1.8rem; margin-bottom: 4px; }

  .footer-note { text-align: center; margin-top: 28px; font-size: 12px; color: var(--ink-soft); line-height: 1.7; }
</style>
</head>

<div class="wrapper">
  <header>
    <div class="eyebrow">Nutrición &amp; Salud</div>
    <h1>Consultor de<br/><em>Ácido Úrico</em></h1>
    <p class="subtitle">Escribe cualquier alimento y descubre al instante<br/>si es seguro, moderado o mejor evitarlo.</p>
  </header>

  <div class="card">
    <div class="input-group">
      <label for="foodInput">Nombre del alimento</label>
      <div class="search-row">
        <div class="autocomplete-wrapper">
          <input type="text" id="foodInput" placeholder="ej. sardinas, huevo, pollo…" autocomplete="off" />
          <div class="suggestions" id="suggestions"></div>
        </div>
        <button class="check-btn" onclick="checkFood()">Consultar</button>
      </div>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--red-badge)"></span>Prohibido</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--orange-badge)"></span>Con moderación</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--green-badge)"></span>Permitido</span>
    </div>
    <p class="db-count" id="dbCount"></p>
    <div class="divider">resultado</div>
    <div id="result"></div>
  </div>

  <p class="footer-note">
    Esta herramienta es solo informativa.<br/>
    Consulta siempre a tu médico o nutricionista para orientación personalizada.
  </p>

  <button id="installBtn" style="display:none; margin-top:20px; align-items:center; gap:10px;
    padding:14px 24px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;

    border-radius:12px; cursor:pointer; transition:background 0.2s;">
    📲 Instalar app en el móvil
  </button>
</div>

const config = {
  prohibited: { icon:"🚫", badgeText:"Prohibido",       className:"prohibited" },
  caution:    { icon:"⚠️", badgeText:"Con moderación",  className:"caution"   },
  acceptable: { icon:"✅", badgeText:"Permitido",        className:"acceptable"}
};

const total = Object.keys(foodDatabase).length;
document.getElementById('dbCount').textContent = `Base de datos: ${total} alimentos`;

function normalize(str) {
  return str.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,' ');
}

function findFood(query) {
  const q = normalize(query);
  for (const [key,val] of Object.entries(foodDatabase))
    if (normalize(key)===q) return {key,...val};
  for (const [key,val] of Object.entries(foodDatabase)) {
    const nk = normalize(key);
    if (q.includes(nk)||nk.includes(q)) return {key,...val};
  }
  return null;
}

function getSuggestions(query) {
  if (query.length<2) return [];
  const q = normalize(query);
  const seen = new Set();
  return Object.entries(foodDatabase)
    .filter(([key])=>{ const nk=normalize(key); return nk.includes(q); })
    .filter(([key])=>{ if(seen.has(normalize(key)))return false; seen.add(normalize(key)); return true; })
    .slice(0,8)
    .map(([key,val])=>({key, category:val.c}));
}

const input = document.getElementById('foodInput');
const sugBox = document.getElementById('suggestions');

input.addEventListener('input',()=>{
  const sug = getSuggestions(input.value);
  if(!sug.length || !input.value.trim()){ sugBox.classList.remove('open'); sugBox.innerHTML=''; return; }
  sugBox.innerHTML = sug.map(s=>`
    <div class="suggestion-item" onclick="selectSuggestion('${escapeHtml(s.key)}')">
      <span class="sug-dot ${s.category}"></span>${escapeHtml(s.key)}
    </div>`).join('');
  sugBox.classList.add('open');
});

function selectSuggestion(value){
  input.value = value;
  sugBox.classList.remove('open');
  sugBox.innerHTML = '';
  checkFood();
}

document.addEventListener('click',e=>{ if(!e.target.closest('.autocomplete-wrapper')) sugBox.classList.remove('open'); });
input.addEventListener('keydown',e=>{ if(e.key==='Enter'){sugBox.classList.remove('open');checkFood();} if(e.key==='Escape') sugBox.classList.remove('open'); });

function checkFood(){
  const resultDiv = document.getElementById('result');
  const query = input.value.trim();
  sugBox.classList.remove('open');
  if(!query){ input.focus(); input.style.borderColor='var(--red-badge)'; setTimeout(()=>input.style.borderColor='',900); return; }
  const found = findFood(query);
  resultDiv.style.display='none';
  void resultDiv.offsetWidth;
  let html='';
  if(found){
    const cfg=config[found.c];
    html=`<div class="result-box ${cfg.className}">
      <div class="result-top">
        <div><div class="result-icon">${cfg.icon}</div><div class="food-name">${escapeHtml(query)}</div></div>
        <span class="badge ${cfg.className}"><span class="badge-dot"></span>${cfg.badgeText}</span>
      </div>
      <p class="result-explanation">${escapeHtml(found.r)}</p>
    </div>`;
  } else {
    html=`<div class="result-box not-found">
      <div class="result-top">
        <div><div class="result-icon">🔍</div><div class="food-name">${escapeHtml(query)}</div></div>
        <span class="badge not-found"><span class="badge-dot"></span>No encontrado</span>
      </div>
      <p class="result-explanation"><strong>"${escapeHtml(query)}"</strong> no está en nuestra base de datos.
      Consulta a tu médico o nutricionista para una orientación personalizada.</p>
    </div>`;
  }
  resultDiv.innerHTML=html;
  resultDiv.style.display='block';
  resultDiv.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Service Worker (PWA offline) ──────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registrado:', reg.scope))
      .catch(err => console.warn('SW error:', err));
  });
}

// ── Banner de instalación ─────────────────────────────
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (installBtn) {
    installBtn.style.display = 'flex';
    installBtn.addEventListener('click', async () => {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') installBtn.style.display = 'none';
      deferredPrompt = null;
    });
  }
});

window.addEventListener('appinstalled', () => {
  if (installBtn) installBtn.style.display = 'none';
});
</script>
